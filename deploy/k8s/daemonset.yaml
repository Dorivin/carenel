apiVersion: v1
kind: Namespace
metadata:
  name: carenel-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: carenel-agent
  namespace: carenel-system
  labels:
    app: carenel-agent
    app.kubernetes.io/name: carenel
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app: carenel-agent
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: carenel-agent
    spec:
      hostPID: true
      hostNetwork: true
      tolerations:
        - operator: Exists   # run on every node including control-plane
      priorityClassName: system-node-critical
      serviceAccountName: carenel-agent
      containers:
        - name: agent
          image: ghcr.io/Dorivin/carenel:latest
          imagePullPolicy: Always
          args: ["agent"]
          securityContext:
            privileged: true          # required for eBPF probe attachment
            capabilities:
              add: ["SYS_ADMIN", "NET_ADMIN", "SYS_PTRACE"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: proc
              mountPath: /proc
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: debugfs
              mountPath: /sys/kernel/debug
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: carenel-agent
  namespace: carenel-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: carenel-agent
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: carenel-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: carenel-agent
subjects:
  - kind: ServiceAccount
    name: carenel-agent
    namespace: carenel-system
